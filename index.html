<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFF Arch Maker - Catenary</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; padding: 20px; max-width: 450px; margin: 0 auto; }
        h2 { color: #58a6ff; text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 10px;}
        label { display: block; margin-top: 15px; font-weight: bold; color: #8b949e; font-size: 14px;}
        input { width: 100%; box-sizing: border-box; padding: 12px; margin-top: 5px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; font-size: 16px; }
        input:focus { outline: none; border-color: #58a6ff; }
        .result { margin-top: 30px; padding: 20px; background: #161b22; border: 1px solid #30363d; border-left: 4px solid #58a6ff; border-radius: 6px; }
        .result p { margin: 10px 0; font-size: 14px; color: #8b949e; }
        .value { display: block; font-size: 28px; font-weight: bold; color: #ffffff; margin-top: 5px;}
        .note { font-size: 12px; color: #484f58; text-align: center; margin-top: 20px;}
    </style>
</head>
<body>
    <h2>FFF Arch Maker</h2>

    <label>Rozpiętość łuku (L w metrach):</label>
    <input type="number" id="span" value="2.0" step="0.1" oninput="calculate()">

    <label>Wysokość łuku (h w metrach):</label>
    <input type="number" id="height" value="1.5" step="0.1" oninput="calculate()">

    <label>Średnica rękawa (cm):</label>
    <input type="number" id="diameter" value="10" step="1" oninput="calculate()">

    <div class="result">
        <p>Długość rękawa (Krzywa Łańcuchowa): <span class="value" id="length">0.00 <span style="font-size: 16px; color:#8b949e;">m</span></span></p>
        <p>Ilość zaprawy (objętość walca): <span class="value" id="volume">0.00 <span style="font-size: 16px; color:#8b949e;">litrów</span></span></p>
        <p>Masa zaprawy (przyj. 2.1 kg/l): <span class="value" id="mass">0.00 <span style="font-size: 16px; color:#8b949e;">kg</span></span></p>
    </div>
    
    <p class="note">Obliczenia opierają się na przybliżeniu numerycznym parametru a dla równania krzywej łańcuchowej: y = a * cosh(x/a).</p>

    <script>
        // Funkcja znajdująca parametr 'a' dla krzywej łańcuchowej metodą bisekcji
        // Równanie: h = a * (cosh(L / (2*a)) - 1)
        function findCatenaryParameterA(span, height) {
            let L_half = span / 2;
            let a_min = 0.01;
            let a_max = 100.0;
            let a = (a_min + a_max) / 2;
            let tolerance = 0.0001;
            
            for (let i = 0; i < 100; i++) {
                let calc_h = a * (Math.cosh(L_half / a) - 1);
                let diff = calc_h - height;
                
                if (Math.abs(diff) < tolerance) break;
                
                if (diff > 0) {
                    a_min = a; // Obliczona wysokość jest za duża, 'a' musi być większe (krzywa bardziej płaska)
                } else {
                    a_max = a; // Obliczona wysokość za mała, 'a' musi być mniejsze (krzywa bardziej stroma)
                }
                a = (a_min + a_max) / 2;
            }
            return a;
        }

        function calculate() {
            const span = parseFloat(document.getElementById('span').value) || 0.001;
            const height = parseFloat(document.getElementById('height').value) || 0.001;
            const diameter = parseFloat(document.getElementById('diameter').value) || 0;

            // 1. Obliczenie długości krzywej łańcuchowej
            // S = 2 * a * sinh(L / (2*a))
            const a = findCatenaryParameterA(span, height);
            const length = 2 * a * Math.sinh((span / 2) / a);
            
            // 2. Objętość walca (w metrach sześciennych, potem litrach)
            const radiusMeters = (diameter / 2) / 100;
            const volumeCubicMeters = Math.PI * Math.pow(radiusMeters, 2) * length;
            const volumeLiters = volumeCubicMeters * 1000;
            
            // 3. Masa (zakładając gęstość ok 2.1 kg/l dla betonu/zaprawy)
            const mass = volumeLiters * 2.1;

            document.getElementById('length').innerText = length.toFixed(2);
            document.getElementById('volume').innerText = volumeLiters.toFixed(1);
            document.getElementById('mass').innerText = mass.toFixed(1);
        }
        
        // Uruchom obliczenia przy starcie strony
        calculate(); 
    </script>
</body>
</html>
